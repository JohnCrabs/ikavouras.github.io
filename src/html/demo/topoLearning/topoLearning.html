<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TopoLearning</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- MathJax for equations -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      }
    };
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    async>
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/topoLearning.css">
</head>

<body>

  <!-- HEADER CONTAINER -->
  <header id="headerContainer">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold" href="#">
          TopoLearning
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMenu"
          aria-controls="navbarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav ms-auto" id="menuContainer">
            <!-- Navbar is generated from JSON -->
          </ul>
        </div>

      </div>
    </nav>
  </header>

  <!-- CONTENT CONTAINER -->
  <main id="mainContent">
    <!-- Content is loaded here -->
  </main>

  <!-- FOOTER -->
  <footer id="footerContainer" class="border-top">
    <div class="container-fluid px-4 py-3">
      <p class="mb-0 text-center text-muted">
        © 2026 TopoLearning. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Custom JS -->
  <script src="js/topoLearning.js"></script>

</body>
</html>
