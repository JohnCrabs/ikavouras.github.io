<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GeoWorks Web GIS</title>

  <!-- External libraries -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Project CSS -->
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/basemap.css" />
  <link rel="stylesheet" href="css/scale.css" />
  <link rel="stylesheet" href="css/epsg.css" />
  <link rel="stylesheet" href="css/layers.css" />
  <link rel="stylesheet" href="css/toolbar.css" />
  <link rel="stylesheet" href="css/vector-tools.css" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="brand" aria-label="GeoWorks home">
        <div class="brand-logo">
          <i class="fa-solid fa-layer-group"></i>
        </div>
        <div class="brand-name">GeoWorks</div>
      </div>

      <div class="header-search" role="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          id="globalSearch"
          type="search"
          placeholder="Search places, layers, data..."
          aria-label="Search places, layers, data"
        />
      </div>

      <nav class="header-actions" aria-label="Main actions">
        <button class="header-action" type="button" data-action="add">
          <i class="fa-solid fa-plus"></i>
          <span>Add</span>
        </button>

        <button class="header-action" type="button" data-action="import">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span>Import</span>
        </button>

        <button class="header-action" type="button" data-action="share">
          <i class="fa-solid fa-user-group"></i>
          <span>Share</span>
        </button>

        <button class="header-action" type="button" data-action="export">
          <i class="fa-solid fa-download"></i>
          <span>Export</span>
        </button>

        <button class="header-action" type="button" data-action="help">
          <i class="fa-regular fa-circle-question"></i>
          <span>Help</span>
        </button>
      </nav>
    </header>

    <main class="workspace">
      <aside class="tool-sidebar" aria-label="Editing tools">
        <div id="toolbarContainer" class="toolbar-container">
          <div class="toolbar-loading-state">Loading tools...</div>
        </div>
      </aside>

      <section class="map-workspace" aria-label="Map workspace">
        <div class="map-top-toolbar">
          <div class="basemap-control">
            <button
              id="basemapToggleBtn"
              class="map-chip"
              type="button"
              aria-expanded="false"
              aria-controls="basemapMenu"
            >
              <i class="fa-solid fa-map"></i>
              <span id="activeBasemapLabel">OpenStreetMap</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>

            <div id="basemapMenu" class="basemap-menu" aria-label="Basemap list">
              <div class="basemap-loading-state">
                Loading basemaps...
              </div>
            </div>
          </div>

          <div class="scale-control">
            <button
              id="scaleToggleBtn"
              class="map-chip"
              type="button"
              aria-expanded="false"
              aria-controls="scaleMenu"
            >
              <span id="scaleReadout">1:—</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>

            <div id="scaleMenu" class="scale-menu" aria-label="Scale menu">
              <div class="scale-loading-state">
                Loading scale menu...
              </div>
            </div>
          </div>

          <div class="epsg-control">
            <button
              id="epsgToggleBtn"
              class="map-chip"
              type="button"
              aria-expanded="false"
              aria-controls="epsgMenu"
            >
              <span id="activeEpsgLabel">EPSG:4326</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>

            <div id="epsgMenu" class="epsg-menu" aria-label="Coordinate reference system menu">
              <div class="epsg-loading-state">
                Loading coordinate systems...
              </div>
            </div>
          </div>

          <button class="map-chip toggle-chip active" type="button">
            <span class="toggle-dot"></span>
            <span>Snapping</span>
          </button>
        </div>

        <div id="map" aria-label="Interactive map"></div>
      </section>

      <aside class="right-panel" aria-label="Layer and workflow panel">
        <div class="panel-tabs">
          <button class="panel-tab active" type="button" data-panel="layers">Layers</button>
          <button class="panel-tab" type="button" data-panel="styles">Styles</button>
          <button class="panel-tab" type="button" data-panel="data">Data</button>
          <button class="panel-tab" type="button" data-panel="simulation">Simulation</button>
          <button class="panel-tab" type="button" data-panel="export">Export</button>
        </div>

        <section class="panel-content active" id="layersPanel">
          <div class="panel-section-title">Layers</div>

          <div id="layerTree" class="layer-tree-panel" aria-label="Layer hierarchy">
            <div class="empty-panel-state">
              <i class="fa-solid fa-layer-group"></i>
              <h2>No layers yet</h2>
              <p>
                Add layers or groups to start building a parent-child hierarchy.
              </p>
            </div>
          </div>

          <div class="panel-bottom-actions">
            <button type="button" id="addLayerBtn">
              <i class="fa-solid fa-plus"></i>
              Add Layer
            </button>

            <button type="button" id="groupLayerBtn">
              <i class="fa-solid fa-folder-plus"></i>
              Group
            </button>
          </div>
        </section>
      </aside>

      <footer class="status-bar">
        <div>
          <i class="fa-solid fa-location-crosshairs"></i>
          <span id="coordinateReadout">Lat: — Lon: —</span>
        </div>

        <div id="statusScale">Scale: —</div>
        <div>CRS: EPSG:4326</div>
        <div id="selectionReadout">Selected Features: 0</div>

        <div class="system-ok">
          <i class="fa-solid fa-circle"></i>
          Ready
        </div>
      </footer>
    </main>
  </div>

  <!-- External libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.10.0/proj4.js"></script>

  <!-- Project JavaScript -->
  <script src="js/basemap.js"></script>
  <script src="js/scale.js"></script>
  <script src="js/epsg.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/vector-entities.js"></script>
  <script src="js/vector-tools.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
