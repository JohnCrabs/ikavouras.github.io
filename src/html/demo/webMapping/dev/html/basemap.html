<div id="basemapMenu" class="basemap-menu" aria-label="Basemap list">
    <div class="basemap-provider open">
    <button class="basemap-provider-toggle" type="button">
      <span>OpenStreetMap</span>
      <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="basemap-provider-options">
      <button class="basemap-option active" type="button" data-basemap="osmStandard">
        <span class="basemap-preview preview-osm"></span>
        <span>Standard</span>
      </button>

      <button class="basemap-option" type="button" data-basemap="osmHumanitarian">
        <span class="basemap-preview preview-hot"></span>
        <span>Humanitarian</span>
      </button>

      <button class="basemap-option" type="button" data-basemap="osmGermany">
        <span class="basemap-preview preview-osm-de"></span>
        <span>Germany Style</span>
      </button>

      <button class="basemap-option" type="button" data-basemap="osmFrance">
        <span class="basemap-preview preview-france"></span>
        <span>France Style</span>
      </button>
    </div>
    </div>
